<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Poornima Portfolio</title>

<script>
  tailwind.config = { darkMode: "class" };
</script>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="css/custom.css" />

<style>
  html { scroll-behavior: smooth; }
</style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-black dark:text-white">

<!-- GLOBAL -->
<button id="backToTop"
class="fixed bottom-6 right-6 bg-black text-white px-4 py-3 rounded-full shadow-lg hidden">↑</button>

<div id="scroll-bar"></div>
<div id="cursor"></div>

<!-- TOP BAR -->
<header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur border-b">
<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<h1 class="font-bold text-xl">Poornima</h1>

<nav class="hidden md:flex gap-8">
<a href="#projects">Projects</a>
<a href="#experience">Experience</a>
<a href="#skills">Skills</a>
</nav>

<button id="theme-toggle" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded">
Theme
</button>

</div>
</header>

<!-- HERO CARD -->
<section class="max-w-5xl mx-auto mt-10 p-8 bg-white dark:bg-gray-800 rounded-3xl shadow-xl text-center">

<img src="myphoto.jpg"
class="w-32 h-32 mx-auto rounded-full mb-4 shadow-lg">

<h1 class="text-4xl font-bold mb-2">Poornima K</h1>

<h2 id="greeting-text" class="text-gray-500 mb-2"></h2>

<p class="text-gray-600 dark:text-gray-300 mb-6">
<span id="typing-text"></span>
</p>

<div class="flex justify-center gap-4">
<a href="#projects" class="bg-blue-500 text-white px-6 py-2 rounded">Projects</a>
<a href="#contact" class="bg-purple-500 text-white px-6 py-2 rounded">Contact</a>
</div>

</section>

<!-- PROJECTS -->
<section id="projects" class="max-w-6xl mx-auto mt-16">

<h2 class="text-3xl font-bold mb-6 text-center">Projects</h2>

<div class="flex gap-3 mb-6 justify-center">
<input id="project-search"
class="border px-4 py-2 rounded w-80"
placeholder="Search projects...">

<button id="voice-search"
class="bg-blue-500 text-white px-4 rounded">🎤</button>
</div>

<div class="text-center mb-6">
<select id="project-sort" class="px-4 py-2 border rounded">
<option value="default">Sort</option>
<option value="az">A-Z</option>
<option value="za">Z-A</option>
<option value="newest">Newest</option>
<option value="oldest">Oldest</option>
</select>
</div>

<div id="project-filters" class="flex justify-center gap-3 mb-8 flex-wrap"></div>

<div id="projects-container"
class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 px-6"></div>

</section>

<!-- RECENT -->
<section id="recent-projects" class="max-w-6xl mx-auto mt-16 px-6">

<h2 class="text-2xl font-bold mb-6 text-center">Recently Viewed</h2>

<div id="recent-container"
class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</section>

<!-- EXPERIENCE -->
<section id="experience" class="max-w-6xl mx-auto mt-16 px-6">

<h2 class="text-3xl font-bold text-center mb-8">Education</h2>

<div class="grid md:grid-cols-3 gap-6">

<div class="p-6 bg-white dark:bg-gray-800 rounded-xl shadow">
<h3 class="font-bold">B.E CSE</h3>
<p>CIT Mandya</p>
<p>CGPA: 8.0</p>
</div>

<div class="p-6 bg-white dark:bg-gray-800 rounded-xl shadow">
<h3 class="font-bold">PUC</h3>
<p>Government PU College</p>
<p>75%</p>
</div>

<div class="p-6 bg-white dark:bg-gray-800 rounded-xl shadow">
<h3 class="font-bold">SSLC</h3>
<p>Government School</p>
<p>85%</p>
</div>

</div>

</section>

<!-- SKILLS -->
<section id="skills" class="max-w-6xl mx-auto mt-16 px-6">

<h2 class="text-3xl font-bold text-center mb-6">Skills</h2>

<div id="skills-filters" class="flex justify-center gap-3 mb-6"></div>

<div id="skills-container"
class="grid md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

</section>

<!-- CERTIFICATIONS -->
<section id="certifications" class="max-w-6xl mx-auto mt-16 px-6">

<h2 class="text-3xl font-bold text-center mb-6">Certifications</h2>

<div id="certifications-container"
class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</section>

<!-- PROJECT MODAL -->
<div id="project-modal" class="fixed inset-0 hidden bg-black/50 z-50">
<div class="flex items-center justify-center min-h-screen">
<div class="bg-white p-6 rounded w-full max-w-lg">
<h3 id="project-title" class="text-2xl font-bold mb-4"></h3>
<p id="project-desc"></p>
<button id="project-close" class="mt-4 bg-red-400 px-4 py-2 rounded">Close</button>
</div>
</div>
</div>


    
<!-- CONTACT MODAL -->
    <button id="modal-trigger"
            class="fixed bottom-8 right-8 w-16 h-16 bg-blue-900 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl font-bold">
        ☏
    </button>

    <div id="contact-modal" class="fixed inset-0 z-50 hidden bg-black/50 backdrop-blur-md">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div id="modal-content"
                 class="bg-white w-full max-w-md rounded-2xl shadow-2xl scale-95 opacity-0 transition-all duration-300">
                <div class="sticky top-0 border-b p-8 pt-12 bg-white">
                    <h3 class="text-2xl font-bold">Contact Me</h3>
                    <button id="modal-close" class="absolute top-6 right-6 text-2xl font-bold">×</button>
                </div>

                <form id="contact-form" class="p-8 space-y-4">
                    <input id="contact-name" type="text" placeholder="Your name"
                           class="w-full border rounded px-4 py-3">
                    <input id="contact-email" type="email" placeholder="email@website.com"
                           class="w-full border rounded px-4 py-3">

                           <div class="text-center">
    <button id="copy-email"
        class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
        📋 Copy Email
    </button>
</div>
                    <p id="form-message" class="text-sm text-red-500"></p>

                    <div class="flex flex-col sm:flex-row gap-4 pt-4">
                        <button type="button" id="form-cancel" class="flex-1 font-bold py-4 px-6">Cancel</button>
                        <button type="submit" class="flex-1 font-bold py-4 px-6">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MAIN JS ENTRY -->
    <!-- ===================== -->
<!-- DATA FILES FIRST -->
<!-- ===================== -->
<script src="js/data/projects.js"></script>
<script src="js/data/skills.js"></script>
<script src="js/data/certifications.js"></script>

<!-- ===================== -->
<!-- FEATURE FILES -->
<!-- ===================== -->
<script src="js/features/skills-render.js"></script>
<script src="js/features/skills-filter.js"></script>
<script src="js/features/modal.js"></script>
<script src="js/features/contact-validation.js"></script>
<script src="js/features/theme-toggle.js"></script>
<script src="js/features/scroll-progress.js"></script>
<script src="js/features/cursor.js"></script>
<script src="js/features/skills-animation.js"></script>
<script src ="js/features/project-sort.js"></script>

<!-- PROJECT RELATED FEATURES -->
<script src="js/features/project-search.js"></script>
<script src="js/features/recent-projects.js"></script>
<script src="js/features/project-render.js"></script>
<script src="js/features/recent-projects.js"></script>

<!-- OTHER FEATURES -->
<script src="js/features/scroll-spy.js"></script>
<script src="js/features/back-to-top.js"></script>
<script src="js/features/typing.js"></script>
<script src="js/features/developer-stats.js"></script>
<script src="js/features/copy-email.js"></script>
<script src="js/features/certification.js"></script>
<script src="js/features/greeting.js"></script>

<!-- CONTACT FEATURE (ONLY ONCE) -->
<script src="js/features/contact-autosave.js"></script>

<!-- ===================== -->
<!-- MAIN FILE LAST -->
<script src="js/main.js"></script>
</body>
</html>
