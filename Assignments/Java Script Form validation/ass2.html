<!DOCTYPE html>
<html>
<head>
<title>Feedback Analyzer</title>
<style>

body{
font-family:Arial;
margin:40px;
}
input,select,textarea{
display:block;
margin:10px 0;
padding:8px;
width:300px;
}

.card{
border:1px solid #ccc;
padding:10px;
margin-top:10px;
}

.badge{
background:blue;
color:white;
padding:3px 6px;
margin-left:10px;
font-size:12px;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:5px;
margin-top:5px;
}

</style>
</head>

<body>

<h2>Feedback Form</h2>

<input id="name" placeholder="Enter Name">

<input id="email" placeholder="Enter Email">

<select id="type">
<option value="">Select Type</option>
<option>Bug</option>
<option>Suggestion</option>
<option>Appreciation</option>
</select>

<textarea id="feedback" placeholder="Enter Feedback"></textarea>

<button id="submitBtn">Submit</button>

<p id="msg"></p>

<div id="feedbackContainer"></div>

<script src="script.js"></script>

</body>
</html>
