<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FAQ Builder</title>
<style>
body{
font-family: Arial;
margin:40px;
}
input, textarea{
display:block;
margin:10px 0;
width:300px;
padding:8px;
}

button{
padding:8px 12px;
cursor:pointer;
}

.faq{
border:1px solid #ccc;
padding:10px;
margin:10px 0;
}

.badge{
background:orange;
color:white;
padding:3px 6px;
font-size:12px;
margin-left:10px;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:5px 10px;
margin-top:5px;
}
</style>
</head>

<body>

<h2>FAQ Builder</h2>

<input id="question" placeholder="Enter Question">
<textarea id="answer" placeholder="Enter Answer"></textarea>

<button id="addBtn">Add FAQ</button>

<p id="message"></p>

<div id="faqContainer">
<p id="emptyMsg">No FAQs available</p>
</div>

<script src="script.js"></script>

</body>
</html>
