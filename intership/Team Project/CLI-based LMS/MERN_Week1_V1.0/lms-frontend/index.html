<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LMS — Learning Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<!-- ═══ WELCOME SCREEN ═══ -->
<div id="welcome-screen">
  <div class="welcome-logo">L<span>M</span>S</div>
  <div class="welcome-sub">Learning Management System</div>
  <div class="welcome-form">
    <label for="name-input">Your name</label>
    <input id="name-input" type="text" placeholder="e.g. Rakesh Kumar" autocomplete="off"/>
    <button class="btn-primary" onclick="startApp()">Enter →</button>
  </div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="app" style="display:none;">
  <header>
    <div class="logo">L<span>M</span>S</div>
    <div class="user-badge">
      <div class="user-avatar" id="avatar">?</div>
      <span id="username-display">Student</span>
    </div>
  </header>

  <nav>
    <button class="tab active" data-panel="courses">All Courses</button>
    <button class="tab" data-panel="enrolled">My Courses</button>
    <button class="tab" data-panel="progress">Progress</button>
  </nav>

  <main>
    <!-- ALL COURSES -->
    <div id="panel-courses" class="panel active">
      <div class="panel-title">Browse Courses</div>
      <div class="panel-desc">Click a card to view details or enroll</div>
      <div class="course-grid" id="course-grid"></div>
    </div>

    <!-- ENROLLED -->
    <div id="panel-enrolled" class="panel">
      <div class="panel-title">My Courses</div>
      <div class="panel-desc">Courses you are currently enrolled in</div>
      <div class="course-grid" id="enrolled-grid"></div>
    </div>

    <!-- PROGRESS -->
    <div id="panel-progress" class="panel">
      <div class="panel-title">My Progress</div>
      <div class="panel-desc">Track your learning journey</div>
      <div id="progress-list"></div>
    </div>
  </main>
</div>

<!-- ═══ COURSE DETAIL MODAL ═══ -->
<div class="modal-overlay" id="modal">
  <div class="modal">w
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-section-title">Instructor</div>
    <div id="modal-instructor" style="font-size:14px; margin-bottom:4px;"></div>
    <div class="modal-section-title">Lessons</div>
    <div class="lesson-list" id="modal-lessons"></div>
    <div style="margin-top:24px; display:flex; gap:10px;" id="modal-actions"></div>
  </div>
</div>

<!-- ═══ TOAST ═══ -->
<div id="toast-container"></div>

<script src="js/app.js"></script>
</body>
</html>
